# BEGIN_KITTY_THEME
# Catppuccin-Frappe
include current-theme.conf
# END_KITTY_THEME


# =========================
# Window / Appearance
# =========================
launch_with_initial_window yes
background_opacity 1.0
dynamic_background_opacity no
macos_background_blur 0
macos_titlebar_color background
titlebar_style custom
window_title_template "{title}"
remember_window_size yes
window_resize_step_cells 0
window_padding_width 6
window_margin_width 0

# Tab bar (always visible, GUI-friendly)
# from https://github.com/wochap/nix-config/blob/11e30a7a16f5cea8617ed216be87d4757b649af7/modules/shared/programs/gui/kitty/dotfiles/kitty.conf#L129

active_tab_font_style normal
inactive_tab_font_style normal
tab_bar_margin_width 6.0
tab_bar_margin_height 6.0 10.0
tab_bar_style custom
tab_bar_align center
tab_separator ""
tab_title_template "{fmt.bg.default}{fmt.fg.color0}{fmt.bg.color0}{fmt.fg.color7} {sup.index} 󰓩 {title}{bell_symbol}{activity_symbol} {fmt.bg.default}{fmt.fg.color0}{fmt.bg.default}{fmt.fg.default} "
active_tab_title_template "{fmt.bg.default}{fmt.fg.color4}{fmt.bg.color4}{fmt.fg.color0} {sup.index} 󰓩 {title}{bell_symbol}{activity_symbol} {fmt.bg.default}{fmt.fg.color4}{fmt.bg.default}{fmt.fg.default} "
tab_bar_background #303446
tab_bar_margin_color #303446
active_tab_background #303446
inactive_tab_background #303446
active_tab_foreground #C6D0F5
inactive_tab_foreground #C6D0F5

# =========================
# Selection
# =========================
copy_on_select clipboard

# Show notification when copying from Kitty (Cmd+C)
map cmd+c combine : copy_to_clipboard : kitten notify "Copied!" "Text copied to clipboard"

# NOTE: Kitty does NOT support custom actions on mouse-based text selection
# The "mouse_map left release grabbed" approach doesn't work for selection events
# 
# WORKING OPTIONS:
# 1. copy_on_select clipboard (auto-copy, no notification)
# 2. Background clipboard monitor (see README.md for setup)
# 3. Manual Cmd+C after selection

# =========================
# Scrollback
# =========================
scrollback_lines 10000
scrollback_pager sh -lc 'export LESSCHARSET=utf-8 LESSUTFCHARDEF=E000-F8FF:p,F0000-FFFFD:p,100000-10FFFD:p; cat | less -R'

# =========================
# Cursor
# =========================
cursor_shape beam
cursor #f2d5cf
cursor_text_color #303446
cursor_blink_interval 0.6

# =========================
# Font
# =========================
font_family JetBrainsMono Nerd Font Mono
font_size 13.0

# =========================
# Borders / Focus
# =========================
window_border_width 0.5pt
draw_window_borders_for_single_window no
active_border_color #51576D
inactive_border_color #414559
inactive_text_alpha 0.55

# =========================
# Scrollbar (Ghostty-style, minimal)
# =========================
scrollbar_width 0.6
scrollbar_color #6c6f85
scrollbar_opacity 0.6
scrollbar_track_color #303446
scrollbar_track_opacity 0
scrollbar_autohide yes
scrollbar_track_behavior page
scrollbar_min_thumb_height 20
scrollbar_gap 2
scrollbar_hitbox_expansion 0

# =========================
# MOUSE BEHAVIOR
# =========================

# Right click = paste from clipboard (Ghostty-like behavior)
mouse_map right press ungrabbed paste_from_clipboard

# Modifier + right click = quick actions (Ghostty-ish)
# vsplit = left/right, hsplit = top/bottom
mouse_map ctrl+right press ungrabbed combine : goto_layout splits : launch --location=vsplit
mouse_map ctrl+shift+right press ungrabbed combine : goto_layout splits : launch --location=hsplit
mouse_map alt+right press ungrabbed close_window
mouse_map shift+right press ungrabbed combine : clear_terminal reset active : send_text all \r

# Middle click = paste from primary selection (standard Unix behavior)
mouse_map middle press ungrabbed paste_from_selection

# Hide mouse cursor while typing
hide_mouse_when_typing yes

# Adjust mouse scroll speed (higher = faster)
wheel_scroll_multiplier 2.0

# =========================
# URL Handling
# =========================
url_prefixes https ssh git file ftp
detect_urls yes
open_url_with default
mouse_map ctrl+left click ungrabbed grab_url

# =========================
# KEYBINDINGS (Ghostty-like replacements)
# =========================

# Tab/window chooser (built-in)
map ctrl+shift+e launch --type=overlay ~/.config/kitty/kitty-tab-switcher

# Splits
# vsplit = left/right, hsplit = top/bottom
map cmd+d combine : goto_layout splits : launch --location=vsplit --cwd=current
map cmd+shift+d combine : goto_layout splits : launch --location=hsplit --cwd=current

# Close current split/window
map cmd+w close_window

# Reset terminal (clear screen + reset state)
map cmd+shift+r combine : clear_terminal reset active : send_text all \r

# Clear screen only (without full reset)
map cmd+shift+l clear_terminal clear active

# Change window name (macOS titlebar)
map cmd+shift+i set_window_title

# Change tab name (tab bar)
map cmd+shift+t set_tab_title

# Create new tab
map cmd+t launch --type=tab --cwd=current

# Switch between tabs
map cmd+shift+right next_tab
map cmd+shift+left previous_tab

# Direct tab switching (cmd+1 through cmd+9)
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Page Up/Down for scrolling
map page_up scroll_page_up
map page_down scroll_page_down

# Home/End handled by terminal/shell

# Search scrollback (opens pager in search mode, uses selection if any)
map cmd+shift+f search_scrollback
# Open scrollback without auto-search
map cmd+shift+h show_scrollback

# Show output of last command (formatted, overlay pager + Nerd Font icons)
map cmd+. launch --stdin-source=@last_cmd_output --stdin-add-formatting --type=overlay sh -lc 'LESSCHARSET=utf-8 LESSUTFCHARDEF=E000-F8FF:p,F0000-FFFFD:p,100000-10FFFD:p less +G -R'

# paste the clipboard
map shift+enter send_text all \n

# Open current directory in Finder
map cmd+o launch --type=background open .

# =========================
# Menu (macOS menubar shortcuts)
# =========================
menu_map global "Actions::Paste" paste_from_clipboard
menu_map global "Actions::Split Right" combine : goto_layout splits : launch --location=vsplit
menu_map global "Actions::Split Down" combine : goto_layout splits : launch --location=hsplit
menu_map global "Actions::Reset Terminal" combine : clear_terminal reset active : send_text all \r
menu_map global "Actions::Change Window Name" set_window_title
menu_map global "Actions::Change Tab Name" set_tab_title

# =========================
# Notifications for background jobs
# =========================
enable_audio_bell no
visual_bell_duration 0.3
background_command_notification_enable yes

# =========================
# Clipboard
# =========================
clipboard_control write-clipboard write-primary

# =========================
# Misc
# =========================
confirm_os_window_close 1
allow_remote_control socket-only
listen_on unix:/tmp/kitty-socket-{kitty_pid}

# =========================
# Navigation
# =========================
map cmd+e select_tab
map cmd+shift+e focus_visible_window
